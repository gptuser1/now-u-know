name = "now-u-know"
main = "src/index.ts"
compatibility_date = "2024-06-20"

# Run four times daily at 08:00, 12:00, 18:00, 22:00 UTC
[triggers]
crons = [
  "0 8 * * *",
  "0 12 * * *",
  "0 18 * * *",
  "0 22 * * *"
]


[vars]
# Plain text vars (secrets use wrangler secret put in CI)
OPENAI_BASE_URL = ""
OPENAI_MODEL = ""
