name = "now-u-know"
main = "src/index.ts"
compatibility_date = "2024-06-20"

# Run four times daily at CST 08:00, 12:00, 18:00, 22:00
# UTC offsets: 00:00, 04:00, 10:00, 14:00
[triggers]
crons = [
  "0 0 * * *",
  "0 4 * * *",
  "0 10 * * *",
  "0 14 * * *"
]


[vars]
# Plain text vars (secrets use wrangler secret put in CI)
OPENAI_BASE_URL = ""
OPENAI_MODEL = ""
